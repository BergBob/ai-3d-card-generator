<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design 2: Ember</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1210; color: #f0e6dc; height: 100vh; overflow: hidden; }

.app { display: flex; flex-direction: column; height: 100vh; }

.header {
  display: flex; align-items: center; padding: 12px 24px; gap: 16px;
  background: rgba(26, 18, 16, 0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(249, 115, 22, 0.15);
}
.header h1 {
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, #f97316, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 12px rgba(249, 115, 22, 0.4));
}
.header-spacer { flex: 1; }
.header-btn {
  padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(249, 115, 22, 0.2);
  background: rgba(249, 115, 22, 0.08); color: #fdba74; font-size: 12px; cursor: pointer;
}

.main { display: flex; flex: 1; overflow: hidden; }

.sidebar {
  width: 320px; padding: 16px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 12px;
}

.panel {
  background: rgba(249, 115, 22, 0.03);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(249, 115, 22, 0.08);
  border-radius: 14px; padding: 18px;
}
.panel:hover { border-color: rgba(249, 115, 22, 0.18); }
.panel h3 {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
  color: #f97316; margin-bottom: 14px; font-weight: 600;
}

.slider-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.slider-row label { font-size: 13px; color: #a8998e; }
.slider-row span { font-size: 13px; color: #fbbf24; font-weight: 600; }
input[type="range"] {
  width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
  background: rgba(249, 115, 22, 0.1); border-radius: 2px; outline: none; margin-top: 4px;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: linear-gradient(135deg, #f97316, #fbbf24);
  box-shadow: 0 0 10px rgba(249, 115, 22, 0.5); cursor: pointer;
}

.toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.toggle-row label { font-size: 13px; color: #a8998e; }
.toggle { width: 36px; height: 20px; border-radius: 10px; background: rgba(255,255,255,0.1); position: relative; cursor: pointer; }
.toggle.on { background: #f97316; }
.toggle::after { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: white; top: 2px; left: 2px; transition: 0.2s; }
.toggle.on::after { left: 18px; }

.preview-area {
  flex: 1; margin: 16px; border-radius: 16px; overflow: hidden; position: relative;
  background: linear-gradient(145deg, #1f1714 0%, #2a1f18 50%, #1a1210 100%);
  box-shadow: inset 0 0 60px rgba(249, 115, 22, 0.03), 0 4px 24px rgba(0,0,0,0.3);
}
.preview-placeholder {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) perspective(800px) rotateX(25deg) rotateZ(-5deg);
  width: 400px; height: 260px; border-radius: 12px;
  background: linear-gradient(135deg, #2a2018, #3d2e22);
  border: 1px solid rgba(249, 115, 22, 0.15);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 30px rgba(249, 115, 22, 0.05);
}
.preview-relief {
  position: absolute; top: 30px; left: 40px; right: 40px; bottom: 40px;
  background: linear-gradient(135deg, #f97316, #dc2626);
  border-radius: 6px; opacity: 0.35;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.6);
}

.chat-input { display: flex; gap: 8px; margin-top: 12px; }
.chat-input textarea {
  flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(249, 115, 22, 0.1);
  background: rgba(0,0,0,0.3); color: #f0e6dc; font-size: 13px; resize: none; height: 40px;
}
.chat-input button {
  width: 40px; height: 40px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #f97316, #fbbf24); color: #1a1210;
  font-size: 16px; cursor: pointer; font-weight: bold;
}

.export-panel { display: flex; gap: 8px; }
.export-btn {
  flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px;
  font-weight: 600; cursor: pointer; color: #1a1210;
  background: linear-gradient(135deg, #f97316, #fbbf24);
  box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
}
.export-btn.secondary { background: linear-gradient(135deg, #dc2626, #b91c1c); color: white; }

.design-label {
  position: fixed; bottom: 20px; right: 20px; padding: 10px 20px;
  background: rgba(249, 115, 22, 0.1); border: 1px solid rgba(249, 115, 22, 0.2);
  border-radius: 10px; font-size: 14px; color: #f97316;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>AI 3D Card Generator</h1>
    <div class="header-spacer"></div>
    <button class="header-btn">+ New</button>
    <button class="header-btn">Save</button>
    <button class="header-btn">Load</button>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="panel">
        <h3>Card Settings</h3>
        <div class="slider-row"><label>Width:</label><span>150mm</span></div>
        <input type="range" value="60">
        <div class="slider-row"><label>Height:</label><span>100mm</span></div>
        <input type="range" value="40">
        <div class="slider-row"><label>Base Thickness:</label><span>1mm</span></div>
        <input type="range" value="20">
        <div class="slider-row"><label>Relief Height:</label><span>1.2mm</span></div>
        <input type="range" value="30">
        <div class="slider-row"><label>Corner Radius:</label><span>5mm</span></div>
        <input type="range" value="25">
        <div class="toggle-row"><label>Invert</label><div class="toggle on"></div></div>
        <div class="toggle-row"><label>Border</label><div class="toggle"></div></div>
      </div>
      <div class="panel">
        <h3>Design Chat</h3>
        <div class="chat-input">
          <textarea placeholder="Birthday cake with candles..."></textarea>
          <button>&#9654;</button>
        </div>
      </div>
      <div class="export-panel">
        <button class="export-btn">Download 3MF</button>
        <button class="export-btn secondary">Download STL</button>
      </div>
    </div>
    <div class="preview-area">
      <div class="preview-placeholder">
        <div class="preview-relief">Happy Birthday</div>
      </div>
    </div>
  </div>
</div>
<div class="design-label">2/5 — Ember</div>
</body>
</html>
